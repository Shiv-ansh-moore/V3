plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.screentimelocks'
version = '0.7.9'

android {
  namespace "expo.modules.screentimelocks"
  defaultConfig {
    versionCode 1
    versionName "0.7.9"
  }
  lintOptions {
    abortOnError false
  }
}
dependencies {
  implementation 'androidx.appcompat:appcompat:1.6.1'
}
